<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Food Calorie Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🍔 Food Calorie Calculator</h1>

<label>Select Food</label>
<select id="food">
<option value="95">Apple (95 cal)</option>
<option value="105">Banana (105 cal)</option>
<option value="250">Burger (250 cal)</option>
<option value="206">Rice (206 cal)</option>
<option value="150">Pizza Slice (150 cal)</option>
<option value="52">Egg (52 cal)</option>
</select>

<label>Quantity</label>
<input type="number" id="qty" value="1" min="1">

<button onclick="calculateCalories()">Calculate Calories</button>

<h2 id="result">Total Calories: 0</h2>

</div>

<script src="script.js"></script>

</body>
</html>
